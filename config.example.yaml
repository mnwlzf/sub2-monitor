# Sub2 Monitor external configuration.
# Docker deploy path: /app/sub-monitor/config/config.yaml
#
# Keep app runtime settings in environment variables unless you need to
# override them here.

sub2api:
  # Required for Priority sync and automatic schedulable pause/restore.
  # The admin API key is generated in Sub2API admin settings.
  admin_base_url: "https://your-sub2api.example.com"
  admin_api_key: "admin-change-this-key"
  auto_schedulable_enabled: false
  auto_schedulable_failure_threshold: 3

  # Optional PostgreSQL access. This is only used by database status checks
  # and legacy recorded SQL tools, not by Priority sync.
  database:
    # This host is reachable from sub-monitor through app_sub2api-network.
    host: "sub2api-postgres"
    port: 5432
    user: "newapi"
    password: "change-this-database-password"
    dbname: "sub2api"
    sslmode: "disable"
    connect_timeout_seconds: 5
    # Optional: use one DSN instead of host/user/password/dbname fields.
    # dsn: "postgresql://newapi:change-this-database-password@sub2api-postgres:5432/sub2api?sslmode=disable"
